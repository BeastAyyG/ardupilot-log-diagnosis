name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: "Test Suite (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with ruff
        run: |
          pip install ruff==0.4.4
          ruff check . --output-format=github

      - name: Validate project boundaries
        run: python training/validate_project_boundaries.py

      - name: Run test suite with coverage
        run: |
          pip install pytest-cov
          pytest -q --tb=short --cov=src --cov-report=term-missing --cov-report=xml

      - name: Validate feature_columns.json matches constants
        run: |
          python -c "
import json
from src.constants import FEATURE_NAMES
with open('models/feature_columns.json') as f:
    on_disk = json.load(f)
assert on_disk == FEATURE_NAMES, (
    f'feature_columns.json has {len(on_disk)} features but '
    f'constants.FEATURE_NAMES has {len(FEATURE_NAMES)}. '
    'Regenerate with: python -c \"from src.constants import FEATURE_NAMES; '
    'import json; json.dump(FEATURE_NAMES, open(\\\"models/feature_columns.json\\\", \\\"w\\\"))\"'
)
print(f'feature_columns.json OK — {len(on_disk)} features match constants.py')
          "

  leakage-check:
    name: "Data Leakage Integrity Check"
    runs-on: ubuntu-latest
    # Only meaningful when data directories are present (they are gitignored).
    # The step itself checks for directory existence before running.

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate SHA256 train/holdout leakage
        run: |
          if [ -d "data/kaggle_backups/ardupilot-master-log-pool-v2" ] && [ -d "data/holdouts/production_holdout_clean/dataset" ]; then
            python validate_leakage.py
          else
            echo "⚠️  Data directories not present in this environment — skipping leakage check."
            echo "Run 'python validate_leakage.py' locally after data is populated."
          fi

  regression-benchmark:
    name: "Regression Benchmark (pilot set)"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Dataset files (dataset/ and ground_truth.json) are not committed to the repo.
    # This job is informational only — it runs when data is present and is skipped
    # gracefully otherwise. CI test failures are handled in the 'test' job.
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check for benchmark dataset
        id: dataset_check
        run: |
          if [ -d "dataset" ] && [ -f "ground_truth.json" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "⚠️  Pilot benchmark dataset not present — skipping regression benchmark."
            echo "Populate dataset/ and ground_truth.json to enable this check."
          fi

      - name: Run regression benchmark
        if: steps.dataset_check.outputs.present == 'true'
        run: |
          python -m src.cli.main benchmark --engine hybrid \
            --dataset-dir dataset/ \
            --ground-truth ground_truth.json \
            --assert-min-f1 0.30
